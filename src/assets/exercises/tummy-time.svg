<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF8F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5ebe0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="url(#bg2)" opacity="0.5"/>
  
  <!-- Baby body (on tummy) -->
  <ellipse cx="200" cy="240" rx="70" ry="60" fill="#E8A87C" opacity="0.3"/>
  
  <!-- Head (lifted) -->
  <circle cx="200" cy="160" r="38" fill="#E8A87C"/>
  
  <!-- Hair -->
  <path d="M165 145 Q200 125 235 145 Q240 155 235 160 Q200 140 165 160 Q160 155 165 145" fill="#8B7355"/>
  
  <!-- Face -->
  <circle cx="188" cy="155" r="3" fill="#5D4E37"/>
  <circle cx="212" cy="155" r="3" fill="#5D4E37"/>
  <path d="M193 165 Q200 170 207 165" stroke="#5D4E37" stroke-width="2" fill="none"/>
  
  <!-- Body -->
  <rect x="160" y="195" width="80" height="75" rx="30" fill="#85C1A5"/>
  
  <!-- Arms (supporting) -->
  <path d="M165 210 Q140 230 135 250" stroke="#E8A87C" stroke-width="14" stroke-linecap="round" fill="none"/>
  <path d="M235 210 Q260 230 265 250" stroke="#E8A87C" stroke-width="14" stroke-linecap="round" fill="none"/>
  
  <!-- Legs (behind) -->
  <path d="M175 265 Q165 285 170 295" stroke="#E8A87C" stroke-width="14" stroke-linecap="round" fill="none"/>
  <path d="M225 265 Q235 285 230 295" stroke="#E8A87C" stroke-width="14" stroke-linecap="round" fill="none"/>
  
  <!-- Mat/blanket -->
  <ellipse cx="200" cy="300" rx="90" ry="30" fill="#85C1A5" opacity="0.4"/>
</svg>

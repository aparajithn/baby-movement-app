<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF8F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5ebe0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="url(#bg3)" opacity="0.5"/>
  
  <!-- Baby body (on back) -->
  <ellipse cx="200" cy="230" rx="65" ry="85" fill="#E8A87C" opacity="0.3"/>
  
  <!-- Head -->
  <circle cx="200" cy="155" r="36" fill="#E8A87C"/>
  
  <!-- Hair -->
  <path d="M168 138 Q200 118 232 138 Q237 148 232 153 Q200 133 168 153 Q163 148 168 138" fill="#5D4E37"/>
  
  <!-- Face -->
  <circle cx="189" cy="150" r="3" fill="#5D4E37"/>
  <circle cx="211" cy="150" r="3" fill="#5D4E37"/>
  <path d="M194 160 Q200 165 206 160" stroke="#5D4E37" stroke-width="2" fill="none"/>
  
  <!-- Body -->
  <rect x="172" y="185" width="56" height="85" rx="28" fill="#85C1A5"/>
  
  <!-- Arms (relaxed at sides) -->
  <path d="M172 195 Q155 210 150 230" stroke="#E8A87C" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M228 195 Q245 210 250 230" stroke="#E8A87C" stroke-width="12" stroke-linecap="round" fill="none"/>
  
  <!-- Legs -->
  <path d="M180 265 Q175 285 180 295" stroke="#E8A87C" stroke-width="14" stroke-linecap="round" fill="none"/>
  <path d="M220 265 Q225 285 220 295" stroke="#E8A87C" stroke-width="14" stroke-linecap="round" fill="none"/>
  
  <!-- Massage hands (adult hands) -->
  <ellipse cx="185" cy="230" rx="20" ry="25" fill="#FDF8F3" stroke="#E8A87C" stroke-width="2"/>
  <ellipse cx="215" cy="230" rx="20" ry="25" fill="#FDF8F3" stroke="#E8A87C" stroke-width="2"/>
  
  <!-- I-Love-U pattern arrows -->
  <path d="M175 215 L175 245" stroke="#E8A87C" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  <path d="M200 215 L200 245" stroke="#E8A87C" stroke-width="3" stroke-linecap="round"/>
  <path d="M225 215 L225 245" stroke="#E8A87C" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E8A87C"/>
    </marker>
  </defs>
  
  <!-- I L U letters -->
  <text x="175" y="205" font-family="Arial" font-size="16" fill="#E8A87C" text-anchor="middle" font-weight="bold">I</text>
  <text x="200" y="205" font-family="Arial" font-size="16" fill="#E8A87C" text-anchor="middle" font-weight="bold">L</text>
  <text x="225" y="205" font-family="Arial" font-size="16" fill="#E8A87C" text-anchor="middle" font-weight="bold">U</text>
</svg>

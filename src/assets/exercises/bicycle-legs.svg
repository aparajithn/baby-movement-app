  <circle cx="210" cy="145" r="3" fill="#5D4E37"/>
  <path d="M195 155 Q200 160 205 155" stroke="#5D4E37" stroke-width="2" fill="none"/>
  
  <!-- Body -->
  <rect x="175" y="180" width="50" height="70" rx="25" fill="#85C1A5"/>
  
  <!-- Arms -->
  <path d="M175 190 Q150 200 145 220" stroke="#E8A87C" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M225 190 Q250 200 255 220" stroke="#E8A87C" stroke-width="12" stroke-linecap="round" fill="none"/>
  
  <!-- Legs (cycling motion) -->
  <path d="M185 250 Q170 270 160 260 Q150 250 155 240" stroke="#E8A87C" stroke-width="14" stroke-linecap="round" fill="none"/>
  <path d="M215 250 Q230 270 240 260 Q250 250 245 240" stroke="#E8A87C" stroke-width="14" stroke-linecap="round" fill="none"/>
  
  <!-- Motion lines -->
  <path d="M140 250 Q130 260 140 270" stroke="#85C1A5" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M260 250 Q270 260 260 270" stroke="#85C1A5" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M135 260 Q125 270 135 280" stroke="#85C1A5" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M265 260 Q275 270 265 280" stroke="#85C1A5" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
</svg>

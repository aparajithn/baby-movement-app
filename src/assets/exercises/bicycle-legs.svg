<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF8F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5ebe0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="url(#bg1)" opacity="0.5"/>
  
  <!-- Baby body (on back) -->
  <ellipse cx="200" cy="220" rx="60" ry="80" fill="#E8A87C" opacity="0.3"/>
  
  <!-- Head -->
  <circle cx="200" cy="150" r="35" fill="#E8A87C"/>
  
  <!-- Hair -->
  <path d="M170 130 Q200 110 230 130 Q235 140 230 145 Q200 125 170 145 Q165 140 170 130" fill="#8B7355"/>
  
  <!-- Face -->
